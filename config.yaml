# tweetbot config
# All tunables for ingestion, ranking, and posting live here.
# Anything you want to change without editing code goes in this file.

ingest:
  hackernews:
    enabled: true
    front_page_hits: 30
    high_score_min_points: 150
    high_score_hits: 30
  arxiv:
    enabled: true
    categories: [cs.AI, cs.LG, cs.CL]
    max_results: 40
  google_news:
    enabled: true
    queries:
      - "artificial intelligence"
      - "OpenAI"
      - "Anthropic"
      - "Google DeepMind"
      - "AI startup funding"
      - "large language model"
  rss:
    enabled: true
    feeds:
      - name: techcrunch
        url: https://techcrunch.com/feed/
      - name: theverge
        url: https://www.theverge.com/rss/index.xml
      - name: arstechnica
        url: https://feeds.arstechnica.com/arstechnica/index
      - name: openai_blog
        url: https://openai.com/blog/rss.xml
      - name: deepmind_blog
        url: https://deepmind.google/blog/rss.xml
      # Anthropic doesn't ship a public RSS at a stable URL; pulled in via
      # Google News query "Anthropic" instead.

rank:
  top_n: 20
  freshness_half_life_hours: 12.0
  weights:
    freshness: 0.6
    signal: 0.4
  source_weights:
    hackernews: 1.2
    arxiv: 1.0
    googlenews: 0.8
    rss: 0.9
  dedup_title_threshold: 0.7    # rapidfuzz token_set_ratio / 100

post:
  # cron times in UTC (GitHub Actions uses UTC, no DST shift).
  # Edit if you want to move slots or handle ET<->EDT manually.
  slots_utc:
    - "0 13 * * *"  # 9:00 AM ET
    - "0 16 * * *"  # 12:00 PM ET
    - "0 19 * * *"  # 3:00 PM ET
    - "0 23 * * *"  # 7:00 PM ET

